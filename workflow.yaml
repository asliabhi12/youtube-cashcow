name: youtube_short_masked

steps:
  - download:
      url: https://www.youtube.com/watch?v=aWOggDZHLd4

  - trim:
      start: 0
      end: 30

  - resize:
      preset: youtube
      zoom: 1.15

  # Phase 7 - Audio Effects
  - audio_effect:
     effects:
      - type: normalize
      - type: bass
      - type: treble
      - type: volume
        gain: 12
      - type: speed
        factor: 1.03

  # Phase 7 - Global Color Grading
  - color_effect:
      brightness: 0.05
      contrast: 1.15
      saturation: 1.20
      gamma: 1.0
      hue: 20

  # Phase 6 + Phase 7
  - overlay:
      source: assets/overlays/yellow.jpg
      position:
        x: center
        y: center
      scale: 1.0
      opacity: 1.0

      color:
        saturation: 1.40
        hue: 20
        brightness: 0.08

      mask:
        type: ellipse
        feather: 60
        invert: true

  - encode: {}

  - export:
      output: output/short_masked.mp4