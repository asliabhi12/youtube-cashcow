name: youtube_short_masked

steps:
  - download:
      url: https://www.youtube.com/watch?v=nINIJ1cAbYM

  - trim:
      start: 0
      end: 30

  - resize:
      preset: shorts

  - overlay:
      source: assets/overlays/over.jpg
      position:
        x: center
        y: center
      scale: 1.0
      opacity: 1.0
      rotation: 0
      mask:
        type: ellipse
        feather: 100
        invert: true

  - encode: {}

  - export:
      output: output/short_masked.mp4