# YouTube CashCow - Configuration Settings

app:
  name: "YouTube CashCow"
  version: "1.0.0"
  debug: true

logging:
  level: "INFO"
  console_output: true
  file_output: true
  log_dir: "logs"

storage:
  download_dir: "downloads"
  temp_dir: "temp"
  output_dir: "output"
  assets_dir: "assets"

ffmpeg:
  path: "ffmpeg"
  ffprobe: "ffprobe"
  timeout: 3600
  threads: "auto"

  # Hardware decoding
  hwaccel: "videotoolbox"

  # Hardware encoder
  codec: "h264_videotoolbox"

  # Ignored in bitrate mode, kept for CRF fallback
  preset: "medium"

  # Used only if video_bitrate is null
  crf: 23

  # Fast hardware bitrate encoding
  video_bitrate: "4000k"

  audio_codec: "aac"
  audio_bitrate: "192k"

yt_dlp:
  format: "bestvideo[height<=1080]+bestaudio/best[height<=1080]"
  merge_output_format: "mp4"
  retries: 3
  rate_limit: null

upload:
  youtube:
    privacy_status: "private"
    made_for_kids: false
    category_id: "22"

download:
  quality: "bestvideo+bestaudio"
  format: "mp4"
  output_directory: "downloads/"
  playlist: false
  write_thumbnail: false
  write_description: false
  write_subtitles: false
  retries: 3
  concurrent_downloads: 2
  overwrite: false

pipeline:
  workspace: "workspace"
  cleanup: true
  retries: 0

performance:
  hardware: "auto"
  workers: "auto"
  benchmark: true
  metrics: true
  preferred_encoder: "auto"
  fallback: "software"
